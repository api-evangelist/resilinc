aid: resilinc
name: Resilinc
description: >-
  Resilinc is a cloud/SaaS-based supply chain risk management platform that
  provides REST APIs for accessing supply chain data, disruption events, supplier
  risk assessments, and mitigation planning. The platform offers real-time
  visibility into global supply chain disruptions, AI-powered risk analysis,
  and integrations with ERP systems, Snowflake, and Microsoft Azure. Resilinc
  serves enterprise customers with agentic AI capabilities for autonomous supply
  chain resilience.
type: Index
