    name: Resilinc API
    description: >-
      The Resilinc REST API provides programmatic access to supply chain risk
      data including supplier information, disruption events, risk assessments,
      and mitigation planning data. The API enables integration with ERP systems,
      analytics platforms, and custom applications for offline analysis and
      real-time supply chain monitoring.
